[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install --prefix backend --legacy-peer-deps",
  "npm install --prefix frontend --legacy-peer-deps"
]

[phases.build]
cmds = [
  "npm run build --prefix frontend",
  "node scripts/copy-frontend.js",
  "ls -la backend/public/"
]

[start]
cmd = "node backend/src/server.js"
